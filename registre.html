<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Register</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-container">

    <form class="auth-box">

        <h1>Create your account</h1>

<p style="text-align:center;">
  Join Snew AI today
</p>

        <input
        type="text"

        placeholder="Password">

        <button>
            Register
        </button>

        <a href="login.html">
            Login

    </form>

</div>

</body>
</html>
